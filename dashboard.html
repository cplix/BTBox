<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Realtime Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }

.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  border-left:6px solid #ccc;
}

/* 🔥 Gruppenfarben */
.group-Siemens { border-left-color:#3498db; }
.group-Bentz { border-left-color:#e67e22; }
.group-Zuse { border-left-color:#9b59b6; }

.bar {
  background:#ddd;
  height:20px;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.bar-inner {
  height:100%;
  background:#27ae60;
  color:white;
  text-align:center;
  font-size:12px;
}

.status {
  font-weight:bold;
  margin-top:5px;
}

.quality-ok { color:#27ae60; font-weight:bold; }
.quality-fail { color:#e74c3c; font-weight:bold; }

.activity {
  font-size:0.85em;
  color:#555;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>📊 Produktions-Dashboard (Live)</h1>
<div id="list">🔄 Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const stepOrder = [
  "Konstruktion",
  "Fertigung",
  "Vormontage",
  "Endmontage",
  "Endabnahme"
];

const listDiv = document.getElementById("list");

let listeners = [];

/* 🔥 CACHE für JSON */
let productMetaCache = {};

/* 🚀 PARALLEL JSON LOAD */
async function loadAllProductMeta(ids){

  const promises = ids.map(async id => {

    try {
      const res = await fetch(`data/${id}.json`);
      if (!res.ok) throw new Error();

      const json = await res.json();

      return {
        id,
        name: json.product_name || "Bluetooth-Box",
        group: json.group_name || null
      };

    } catch {
      return {
        id,
        name: "Bluetooth-Box",
        group: null
      };
    }
  });

  const results = await Promise.all(promises);

  results.forEach(r => {
    productMetaCache[r.id] = r;
  });
}

/* 🔥 LETZTE AKTIVITÄT – OPTIMIERT */
async function getLastActivity(productId){

  let latest = null;

  const stepsSnap = await db.collection("products")
    .doc(productId)
    .collection("steps")
    .get();

  const promises = stepsSnap.docs.map(stepDoc =>
    db.collection("products")
      .doc(productId)
      .collection("steps")
      .doc(stepDoc.id)
      .collection("history")
      .orderBy("timestamp","desc")
      .limit(1)
      .get()
  );

  const results = await Promise.all(promises);

  results.forEach(snap=>{
    snap.forEach(h=>{
      const d = h.data();
      if(!latest || d.timestamp > latest.timestamp){
        latest = d;
      }
    });
  });

  return latest;
}

/* 🚀 DASHBOARD */
async function renderDashboard(){

  const productsSnap = await db.collection("products").get();
  const ids = productsSnap.docs.map(d=>d.id);

  // 🔥 JSON parallel laden
  await loadAllProductMeta(ids);

  let html = "";

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;
    const pdata = productDoc.data() || {};
    const meta = productMetaCache[pid] || {};

    const pname = meta.name;
    const group = meta.group;

    const stepsSnap = await db.collection("products")
      .doc(pid)
      .collection("steps")
      .get();

    let completed = 0;

    stepsSnap.forEach(doc=>{
      if(doc.data().status === "bestanden") completed++;
    });

    const percent = Math.round((completed / stepOrder.length) * 100);

    let statusText = "🔴 nicht begonnen";
    if(percent === 100) statusText = "🟢 abgeschlossen";
    else if(percent > 0) statusText = "🟡 in Arbeit";

    const quality = pdata.quality_status || "nicht freigegeben";

    let qualityHTML = `<span class="quality-fail">🔴 nicht freigegeben</span>`;
    if(quality === "freigegeben"){
      qualityHTML = `<span class="quality-ok">🟢 freigegeben</span>`;
    }

    const last = await getLastActivity(pid);

    let activityText = "Keine Aktivität";
    if(last){
      activityText = `${last.user} – ${last.action} – ${last.timestamp}`;
    }

    // 🔥 Gruppenklasse
    const groupClass = group ? `group-${group}` : "";

    html += `
      <div class="card ${groupClass}" onclick="openProduct('${pid}')">

        <b>${pname}</b><br>

        ${group ? `<small>Gruppe: ${group}</small><br>` : ""}

        <small>${pid}</small>

        <div class="bar">
          <div class="bar-inner" style="width:${percent}%">
            ${percent}%
          </div>
        </div>

        <div class="status">${statusText}</div>

        <div>${qualityHTML}</div>

        <div class="activity">
          <b>Letzte Aktivität:</b><br>
          ${activityText}
        </div>

      </div>
    `;
  }

  listDiv.innerHTML = html || "Keine Produkte vorhanden.";
}

/* 🔥 REALTIME */
async function startRealtime(){

  const productsSnap = await db.collection("products").get();

  listeners.forEach(unsub => unsub());
  listeners = [];

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;

    const unsub = db.collection("products")
      .doc(pid)
      .collection("steps")
      .onSnapshot(()=>{
        renderDashboard();
      });

    listeners.push(unsub);
  }

  renderDashboard();

  db.collection("products").onSnapshot(()=>{
    startRealtime();
  });
}

function openProduct(id){
  window.location.href = `index.html?id=${id}`;
}

startRealtime();

</script>

</body>
</html>
