<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Realtime Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }

.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  border-left:6px solid #ccc;
}

.group-Siemens { border-left-color:#3498db; }
.group-Bentz { border-left-color:#e67e22; }
.group-Zuse { border-left-color:#9b59b6; }

.bar {
  background:#ddd;
  height:20px;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.bar-inner {
  height:100%;
  background:#27ae60;
  color:white;
  text-align:center;
  font-size:12px;
}

.status { font-weight:bold; margin-top:5px; }

.quality-ok { color:#27ae60; font-weight:bold; }
.quality-fail { color:#e74c3c; font-weight:bold; }

.activity {
  font-size:0.85em;
  color:#555;
  margin-top:10px;
}

/* 🔥 Substep Styling */
.substep-block {
  margin-top:10px;
  font-size:12px;
}

.sub-bar {
  background:#ddd;
  height:6px;
  border-radius:4px;
  margin-top:2px;
}

.sub-bar-inner {
  height:100%;
  border-radius:4px;
}
</style>
</head>

<body>

<h1>📊 Produktions-Dashboard (Live)</h1>
<div id="list">🔄 Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const stepOrder = [
  "Konstruktion",
  "Fertigung",
  "Vormontage",
  "Endmontage",
  "Endabnahme"
];

const listDiv = document.getElementById("list");

let productMetaCache = {};
let listeners = [];

// 🔥 JSON PARALLEL
async function loadAllMeta(ids){

  const results = await Promise.all(ids.map(async id => {
    try {
      const res = await fetch(`data/${id}.json`);
      const json = await res.json();
      return {
        id,
        name: json.product_name || "Bluetooth-Box",
        group: json.group_name || null
      };
    } catch {
      return { id, name:"Bluetooth-Box", group:null };
    }
  }));

  results.forEach(r => productMetaCache[r.id] = r);
}

// 🔥 Substep Progress
function getSubstepProgress(stepData){

  const sub = stepData.substeps || {};
  const values = Object.values(sub);

  if(values.length === 0) return null;

  const done = values.filter(v => v).length;
  const total = values.length;

  return {
    percent: Math.round((done / total) * 100),
    done,
    total
  };
}

// 🔥 Farbe je Fortschritt
function getColor(percent){
  if(percent < 30) return "#e74c3c";
  if(percent < 70) return "#f1c40f";
  return "#27ae60";
}

// 🔥 Substep Übersicht
function renderSubstepsOverview(stepsSnap){

  let html = "";

  stepsSnap.forEach(doc => {

    const stepId = doc.id;
    const data = doc.data();

    const prog = getSubstepProgress(data);
    if(!prog) return;

    const color = getColor(prog.percent);

    html += `
      <div class="substep-block">
        ${stepId}

        <div class="sub-bar">
          <div class="sub-bar-inner"
            style="width:${prog.percent}%; background:${color}">
          </div>
        </div>

        ${prog.done}/${prog.total} (${prog.percent}%)
      </div>
    `;
  });

  return html;
}

// 🚀 RENDER
async function renderDashboard(){

  const productsSnap = await db.collection("products").get();
  const ids = productsSnap.docs.map(d=>d.id);

  await loadAllMeta(ids);

  let html = "";

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;
    const pdata = productDoc.data() || {};
    const meta = productMetaCache[pid] || {};

    const pname = meta.name;
    const group = meta.group;

    const stepsSnap = await db.collection("products")
      .doc(pid)
      .collection("steps")
      .get();

    let completed = 0;
    let latest = null;

    stepsSnap.forEach(doc=>{
      const d = doc.data();

      if(d.status === "bestanden") completed++;

      if(d.last_activity){
        if(!latest || d.last_activity.timestamp > latest.timestamp){
          latest = d.last_activity;
        }
      }
    });

    const percent = Math.round((completed / stepOrder.length) * 100);

    let statusText = "🔴 nicht begonnen";
    if(percent === 100) statusText = "🟢 abgeschlossen";
    else if(percent > 0) statusText = "🟡 in Arbeit";

    const quality = pdata.quality_status || "nicht freigegeben";

    let qualityHTML = `<span class="quality-fail">🔴 nicht freigegeben</span>`;
    if(quality === "freigegeben"){
      qualityHTML = `<span class="quality-ok">🟢 freigegeben</span>`;
    }

    let activityText = "Keine Aktivität";
    if(latest){
      activityText = `${latest.user} – ${latest.action} – ${latest.timestamp}`;
    }

    const groupClass = group ? `group-${group}` : "";

    // 🔥 NEU: Substeps
    const substepsHTML = renderSubstepsOverview(stepsSnap);

    html += `
      <div class="card ${groupClass}" onclick="openProduct('${pid}')">

        <b>${pname}</b><br>
        ${group ? `<small>Gruppe: ${group}</small><br>` : ""}
        <small>${pid}</small>

        <div class="bar">
          <div class="bar-inner" style="width:${percent}%">
            ${percent}%
          </div>
        </div>

        <div class="status">${statusText}</div>
        <div>${qualityHTML}</div>

        ${substepsHTML}

        <div class="activity">
          <b>Letzte Aktivität:</b><br>
          ${activityText}
        </div>

      </div>
    `;
  }

  listDiv.innerHTML = html || "Keine Produkte vorhanden.";
}

// 🔥 REALTIME
async function startRealtime(){

  const productsSnap = await db.collection("products").get();

  listeners.forEach(unsub=>unsub());
  listeners = [];

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;

    const unsub = db.collection("products")
      .doc(pid)
      .collection("steps")
      .onSnapshot(()=>{
        renderDashboard();
      });

    listeners.push(unsub);
  }

  renderDashboard();

  db.collection("products").onSnapshot(()=>{
    startRealtime();
  });
}

function openProduct(id){
  window.location.href = `index.html?id=${id}`;
}

startRealtime();

</script>

</body>
</html>
