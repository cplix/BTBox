<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Realtime Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }

.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  border-left:6px solid #ccc;
}

.group-Siemens { border-left-color:#3498db; }
.group-Bentz { border-left-color:#e67e22; }
.group-Zuse { border-left-color:#9b59b6; }

.bar {
  background:#ddd;
  height:20px;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.bar-inner {
  height:100%;
  color:white;
  text-align:center;
  font-size:12px;
}

/* 🔥 STATUS-FARBEN (wie Detailseite) */
.bar-inner.done { background:#27ae60; }
.bar-inner.ready { background:#f1c40f; color:black; }
.bar-inner.progress { background:#3498db; }
.bar-inner.empty { background:#e74c3c; }

/* 🔥 STATUS BADGES (wie Detailseite) */
.badge {
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
}

.badge-red {
  background:#e74c3c;
  color:white;
}

.badge-yellow {
  background:#f1c40f;
  color:black;
}

.badge-green {
  background:#27ae60;
  color:white;
}

.badge-blue {
  background:#3498db;
  color:white;
}

.activity {
  font-size:0.85em;
  color:#555;
  margin-top:10px;
}

/* 🔥 Substep Styling */
.substep-block {
  margin-top:10px;
  font-size:12px;
}

.sub-bar {
  background:#ddd;
  height:6px;
  border-radius:4px;
  margin-top:2px;
}

.sub-bar-inner {
  height:100%;
  border-radius:4px;
}
</style>
</head>

<body>

<h1>📊 Produktions-Dashboard (Live)</h1>
<div id="list">🔄 Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

// =====================================================
// ⚙️ CONFIG LAYER
// =====================================================

const CONFIG = {
  stepOrder: [
    "Konstruktion",
    "Fertigung",
    "Vormontage",
    "Endmontage",
    "Endabnahme"
  ],
  refreshDebounceMs: 800
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const stepOrder = CONFIG.stepOrder;

const listDiv = document.getElementById("list");

let productMetaCache = {};
let listeners = [];


let metaLoadedIds = new Set();

// =====================================================
// 📦 DATA LAYER (Firebase + Fetch)
// =====================================================
async function loadAllMeta(ids){

  const missingIds = ids.filter(id => !metaLoadedIds.has(id));

  if(missingIds.length === 0) return;

  const results = await Promise.all(missingIds.map(async id => {
    try {
      const res = await fetch(`data/${id}/${id}.json`);
      if(!res.ok) throw new Error("meta not found");
      const json = await res.json();

      return {
        id,
        name: json.product_name || "Bluetooth-Box",
        group: json.group_name || null
      };
    } catch {
      return { id, name:"Bluetooth-Box", group:null };
    }
  }));

  results.forEach(r => {
    productMetaCache[r.id] = r;
    metaLoadedIds.add(r.id);
  });
}




// =====================================================
// 🧠 LOGIC LAYER (Berechnungen, KEIN DOM!)
// =====================================================

// 🔹 Letzte Aktivität eines Produkts berechnen
function computeActivity(stepsSnap){

  let latest = null;

  stepsSnap.forEach(doc => {
    const d = doc.data();

    if(d.last_update){
      if(!latest || d.last_update > latest.timestamp){
        latest = {
          user: d.last_user,
          action: "Status geändert",
          timestamp: d.last_update
        };
      }
    }
  });

  if(!latest) return "Keine Aktivität";

  return `${latest.user} – ${latest.action} – ${latest.timestamp}`;
}


// 🔹 Fortschritt berechnen (neu – ausgelagert)
function computeProgress(stepMap){

  let completed = 0;

  Object.entries(stepMap).forEach(([id, step])=>{
    if(step.status === "bestanden" && id !== "Endabnahme"){
      completed++;
    }
  });

  return Math.round((completed / (stepOrder.length - 1)) * 100);
}

// 🔹 Freigabe berechnen (neu – ausgelagert)
function computeRelease(stepMap){
  return stepMap["Endabnahme"]?.status === "bestanden";
}


// 🔹 Gesamtstatus eines Produkts berechnen (Fortschritt, Status, Freigabe, Aktivität)
function computeProductState(stepsSnap){

  const stepMap = {};

  stepsSnap.forEach(doc=>{
    stepMap[doc.id] = doc.data();
  });

  const percent = computeProgress(stepMap);

  const status = getStatusFromSteps(stepMap);

  const released = computeRelease(stepMap);

  const activityText = computeActivity(stepsSnap);

  return {
    stepMap,
    percent,
    status,
    released,
    activityText
  };
}

// 🔥 Substep Progress
function getSubstepProgress(stepData){

  const sub = stepData.substeps || {};
  const values = Object.values(sub);

  if(values.length === 0) return null;

  const done = values.filter(v => v).length;
  const total = values.length;

  return {
    percent: Math.round((done / total) * 100),
    done,
    total
  };
}

// 🔥 Farbe je Fortschritt
function getColor(percent){
  if(percent < 30) return "#e74c3c";
  if(percent < 70) return "#f1c40f";
  return "#27ae60";
}

function getStatusFromSteps(stepMap){

  const totalSteps = Object.keys(stepMap).length;

  const doneSteps = Object.values(stepMap)
    .filter(s => s.status === "bestanden").length;

  const anyProgress = Object.values(stepMap)
    .some(s => Object.values(s.substeps || {}).some(v=>v));

  if(doneSteps === totalSteps) return "done";
  if(anyProgress) return "progress";

  return "empty";
}

function getStatusBadge(status){

  if(status === "done"){
    return `<span class="badge badge-green">abgeschlossen</span>`;
  }

  if(status === "progress"){
    return `<span class="badge badge-blue">in Arbeit</span>`;
  }

  return `<span class="badge badge-red">nicht begonnen</span>`;
}

function getQualityBadge(released){

  return released
    ? `<span class="badge badge-green">freigegeben</span>`
    : `<span class="badge badge-red">nicht freigegeben</span>`;
}

// 🔥 Substep Übersicht
function renderSubstepsOverview(stepsSnap){

  const stepMap = {};
  stepsSnap.forEach(doc=>{
    stepMap[doc.id] = doc.data();
  });

  let html = `<div style="
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:8px;
    margin-top:10px;
  ">`;

  stepOrder.forEach(stepId => {

    const data = stepMap[stepId];

    let percent = 0;

    if(data){
      const prog = getSubstepProgress(data);
      if(prog) percent = prog.percent;
    }

    const color = getColor(percent);

    html += `
      <div style="text-align:center; font-size:11px;">

        <b>${stepId}</b>

        <div class="sub-bar" style="margin-top:4px;">
          <div class="sub-bar-inner"
            style="width:${percent}%; background:${color}">
          </div>
        </div>

        ${percent > 0 ? percent + "%" : ""}

      </div>
    `;
  });

  html += `</div>`;
  return html;
}

// =====================================================
// 🎨 RENDER LAYER (DOM Manipulation)
// =====================================================

async function loadSteps(pid){
  return await db.collection("products")
    .doc(pid)
    .collection("steps")
    .get();
}


// =====================================================
// 🎨 RENDER LAYER (DOM)
// =====================================================
async function renderDashboard(){

  const productsSnap = await db.collection("products").get();
  const ids = productsSnap.docs.map(d=>d.id);

  await loadAllMeta(ids);

  let html = "";

  // 🔥 NEU: Steps parallel laden
  const stepsMap = {};

  await Promise.all(
    productsSnap.docs.map(async (doc) => {
      stepsMap[doc.id] = await loadSteps(doc.id);
    })
  );

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;

    const stepsSnap = stepsMap[pid];
    if(!stepsSnap){
      console.warn("Keine Steps für", pid);
      continue;
    }

    const pdata = productDoc.data() || {};
    const meta = productMetaCache[pid] || {};

    const pname = meta.name;
    const group = meta.group;

    const computed = computeProductState(stepsSnap);

    const qualityHTML = getQualityBadge(computed.released);

    const groupClass = group ? `group-${group}` : "";

    // 🔥 NEU: Substeps
    const substepsHTML = renderSubstepsOverview(stepsSnap);

    html += `
      <div class="card ${groupClass}" 
       style="${computed.released ? 'border-left-color:#27ae60' : ''}"
       onclick="openProduct('${pid}')">

        <div style="margin-bottom:5px;">
          <b>${pname} (${pid})</b>
          ${group ? `<span style="color:#555;"> | Gruppe: ${group}</span>` : ""}
        </div>

        <div class="bar">
          <div class="bar-inner ${computed.status}" style="width:${computed.percent}%">
            ${computed.percent}%
          </div>
        </div>

        <div style="margin-top:5px;">
          ${getStatusBadge(computed.status)}
        </div>
        <div style="margin-top:5px;">${qualityHTML}</div>

        ${substepsHTML}

        <div class="activity">
          <b>Letzte Aktivität:</b><br>
          ${computed.activityText}
        </div>

      </div>
    `;
  }

  listDiv.innerHTML = html || "Keine Produkte vorhanden.";
}

// =====================================================
// 🔄 REALTIME LAYER
// =====================================================
async function startRealtime(){

  const productsSnap = await db.collection("products").get();

  listeners.forEach(unsub=>unsub());
  listeners = [];

  for(const productDoc of productsSnap.docs){

    const pid = productDoc.id;

    let renderTimeout = null;

    function triggerRender(){
      if(renderTimeout) return;

      renderTimeout = setTimeout(() => {
        renderDashboard();
        renderTimeout = null;
      }, CONFIG.refreshDebounceMs);
    }

    const unsub = db.collection("products")
      .doc(pid)
      .collection("steps")
      .onSnapshot(() => {
        triggerRender();
      });

    listeners.push(unsub);
  }

  renderDashboard();

  let productsListener = null;

  function initProductsListener(){

    if(productsListener) return;

    productsListener = db.collection("products")
      .onSnapshot(() => {
        startRealtime();
      });
  }
}

function openProduct(id){
  window.location.href = `index.html?id=${id}`;
}

startRealtime();

</script>

</body>
</html>
