<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Realtime Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }

.card {
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  border-left:6px solid #ccc;
}

.group-Siemens { border-left-color:#3498db; }
.group-Bentz { border-left-color:#e67e22; }
.group-Zuse { border-left-color:#9b59b6; }

.bar {
  background:#ddd;
  height:20px;
  border-radius:5px;
  overflow:hidden;
  margin-top:5px;
}

.bar-inner {
  height:100%;
  color:white;
  text-align:center;
  font-size:12px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 4px;
}

/* 🔥 STATUS-FARBEN (wie Detailseite) */
.bar-inner.done { background:#27ae60; }
.bar-inner.ready { background:#f1c40f; color:black; }
.bar-inner.progress { background:#3498db; }
.bar-inner.empty { background:#e74c3c; }

/* 🔥 STATUS BADGES (wie Detailseite) */
.badge {
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
}

.badge-red {
  background:#e74c3c;
  color:white;
}

.badge-yellow {
  background:#f1c40f;
  color:black;
}

.badge-green {
  background:#27ae60;
  color:white;
}

.badge-blue {
  background:#3498db;
  color:white;
}

.activity {
  font-size:0.85em;
  color:#555;
  margin-top:10px;
}

/* 🔥 Substep Styling */
.substep-block {
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.sub-bar {
  background:#ddd;
  height:6px;
  border-radius:4px;
  margin-top:2px;
  width:100px;
}

.sub-bar-inner {
  height:100%;
  border-radius:4px;
}
</style>
</head>

<body>

<h1>📊 Produktions-Dashboard (Live)</h1>
<div id="list">🔄 Lade Daten...</div>

<script>

async function cleanOldProducts(){

  const idsToDelete = ["id001","id002","id003"];

  for(const id of idsToDelete){

    console.log("Lösche:", id);

    const productRef = db.collection("products").doc(id);

    // 🔥 Steps löschen
    const stepsSnap = await productRef.collection("steps").get();

    for(const stepDoc of stepsSnap.docs){

      // History löschen
      const histSnap = await stepDoc.ref.collection("history").get();

      for(const h of histSnap.docs){
        await h.ref.delete();
      }

      await stepDoc.ref.delete();
    }

    // 🔥 Produkt löschen
    await productRef.delete();
  }

  console.log("✅ Cleanup fertig");
}

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

// =====================================================
// ⚙️ CONFIG LAYER
// =====================================================

const CONFIG = {
  stepOrder: [
    "Konstruktion",
    "Fertigung",
    "Vormontage",
    "Endmontage",
    "Endabnahme"
  ],
  refreshDebounceMs: 800
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const stepOrder = CONFIG.stepOrder;

const listDiv = document.getElementById("list");


function getStatusBadge(status){

  if(status === "done"){
    return `<span class="badge badge-green">abgeschlossen</span>`;
  }

  if(status === "progress"){
    return `<span class="badge badge-blue">in Arbeit</span>`;
  }

  return `<span class="badge badge-red">nicht begonnen</span>`;
}

function getQualityBadge(released){

  return released
    ? `<span class="badge badge-green">freigegeben</span>`
    : `<span class="badge badge-red">nicht freigegeben</span>`;
}


// =====================================================
// 🎨 RENDER LAYER (DOM)
// =====================================================

function startRealtime(){

  db.collection("products")
    .onSnapshot(snap => {

      let html = "";

      snap.forEach(doc => {

        const p = doc.data();

        // 🔥 filter: only show real product docs (skip legacy ids)
        if(!p.product_name) return;

        const pname = p.product_name || "Bluetooth-Box";
        const group = p.group_name || "";
        const percent = typeof p.progress === "number" ? p.progress : 0;
        const percentLabel = percent === 0 ? "" : percent + "%";
        const status = p.status || "empty";
        const released = p.released || false;
        const lastUser = p.last_user || "keine Aktivität";
        const lastUpdate = p.last_update
          ? (p.last_update.toDate
              ? p.last_update.toDate().toLocaleString("de-DE", {
                  dateStyle: "short",
                  timeStyle: "short"
                })
              : new Date(p.last_update).toLocaleString("de-DE", {
                  dateStyle: "short",
                  timeStyle: "short"
                }))
          : "-";

        const steps = p.steps || null;

        let substepsHTML = "";

        if(steps){
          substepsHTML = `<div class="substep-block">`;

          Object.keys(steps).forEach(stepName => {
            const step = steps[stepName];
            const percent = step.progress || 0;

            substepsHTML += `
              <div style="min-width:120px;">
                <div style="font-weight:bold; font-size:11px;">${stepName}</div>
                <div class="sub-bar">
                  <div class="sub-bar-inner" style="width:${percent}%; background:${percent === 100 ? '#27ae60' : percent > 0 ? '#3498db' : '#e74c3c'};"></div>
                </div>
              </div>
            `;
          });

          substepsHTML += `</div>`;
        }

        const groupClass = group ? `group-${group.replace("grp_", "").replace(/^[a-z]/, c => c.toUpperCase())}` : "";

        html += `
          <div class="card ${groupClass}"
            onclick="openProduct('${doc.id}')">

            <div style="margin-bottom:5px;">
              <b>${pname}</b>
              ${group ? `<span style="color:#555;"> (${group.replace("grp_", "")})</span>` : ""}
            </div>

            <div class="bar">
              <div class="bar-inner ${status}" style="width:${percent}%">
                ${percentLabel}
              </div>
            </div>

            <div style="margin-top:5px;">
              ${getStatusBadge(status)}
            </div>

            <div style="margin-top:5px;">
              ${getQualityBadge(released)}
            </div>

            <div class="activity">
              👤 ${lastUser}<br>
              🕒 ${lastUpdate}
            </div>

            ${substepsHTML}

          </div>
        `;
      });

      listDiv.innerHTML = html || "Keine Produkte vorhanden.";
    });
}


function openProduct(id){
  window.location.href = `index.html?id=${id}`;
}

startRealtime();

</script>

</body>
</html>
