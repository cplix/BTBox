<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Produktdaten - BT Box</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; margin: 40px; background: #f4f6f8; }
    .card { background: white; padding: 20px; border-radius: 10px; max-width: 600px; }
    .section { margin-bottom: 15px; }
    .status { color: white; padding: 4px 8px; border-radius: 5px; }
    .ok { background: green; }
    .fail { background: red; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    td, th { border: 1px solid #ccc; padding: 5px; }
  </style>

</head>

<body>

<h1>Produktdaten</h1>
<div id="content" class="card">Verbinde...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";
const contentDiv = document.getElementById("content");


// 🔥 Realtime Hauptdaten
db.collection("products").doc(id).onSnapshot(async (docSnap) => {

  if (!docSnap.exists) {
    contentDiv.innerHTML = "❌ Produkt nicht gefunden";
    return;
  }

  const data = docSnap.data();

  const statusClass =
    data.quality_status === "bestanden" ? "ok" : "fail";

  // 🔥 Historie laden
  const historySnap = await db.collection("products")
    .doc(id)
    .collection("history")
    .orderBy("timestamp", "desc")
    .get();

  let historyHTML = "<table><tr><th>Zeit</th><th>Status</th><th>Benutzer</th></tr>";

  historySnap.forEach(doc => {
    const h = doc.data();
    historyHTML += `
      <tr>
        <td>${h.timestamp}</td>
        <td>${h.status}</td>
        <td>${h.user}</td>
      </tr>
    `;
  });

  historyHTML += "</table>";

  contentDiv.innerHTML = `
    <div class="section">
      <b>ID:</b> ${data.product_id}
    </div>

    <div class="section">
      <b>Status:</b><br>
      <span class="status ${statusClass}">
        ${data.quality_status}
      </span>
    </div>

    <div class="section">
      <b>Letzte Änderung:</b><br>
      ${data.last_update || "-"}<br>
      <b>durch:</b> ${data.last_user || "-"}
    </div>

    <div class="section">
      <b>Status ändern:</b><br>

      <input id="userInput" placeholder="Name eingeben"><br><br>

      <select id="statusSelect">
        <option value="bestanden">bestanden</option>
        <option value="nicht bestanden">nicht bestanden</option>
      </select>

      <br><br>
      <button onclick="saveStatus()">Speichern</button>
    </div>

    <div class="section">
      <b>Historie:</b>
      ${historyHTML}
    </div>
  `;
});


// 🔧 Speichern + Historie
async function saveStatus() {

  const status = document.getElementById("statusSelect").value;
  const user = document.getElementById("userInput").value.trim();
  if (!user) {
    alert("Bitte Namen eingeben!");
    return;
  }
  const time = new Date().toLocaleString();

  const productRef = db.collection("products").doc(id);

  try {

    // Hauptdaten aktualisieren
    await productRef.update({
      quality_status: status,
      last_update: time,
      last_user: user
    });

    // 🔥 Historie speichern
    await productRef.collection("history").add({
      status: status,
      user: user,
      timestamp: time
    });

  } catch (err) {
    alert("Fehler: " + err.message);
  }
}

</script>

</body>
</html>
