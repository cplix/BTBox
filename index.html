<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Produktdaten - BT Box</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f6f8;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 15px;
    }

    .label {
      font-weight: bold;
      color: #34495e;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Produktdaten</h1>

<div id="content" class="card">
  Lade Daten...
</div>

<script>
async function loadData() {

  // 👉 URL-Parameter auslesen (?id=id001)
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || "id001";

  const contentDiv = document.getElementById("content");

  try {
    // 👉 JSON laden
    const response = await fetch(`data/${id}.json`);

    if (!response.ok) {
      throw new Error("Produkt nicht gefunden");
    }

    const data = await response.json();

    // 👉 HTML erzeugen
    contentDiv.innerHTML = `
      <div class="section">
        <span class="label">Produkt-ID:</span> ${data.product_id}
      </div>

      <div class="section">
        <span class="label">Version:</span> ${data.version}
      </div>

      <div class="section">
        <span class="label">Fertigung:</span><br>
        3D-Druck: ${data.manufacturing["3d_print"].material}, ${data.manufacturing["3d_print"].layer_height}<br>
        CNC: ${data.manufacturing.cnc.material} (${data.manufacturing.cnc.component})
      </div>

      <div class="section">
        <span class="label">Qualität:</span><br>
        Status: ${data.quality.status}<br>
        Datum: ${data.quality.date}
      </div>

      <div class="section">
        <span class="label">CAD-Link:</span><br>
        <a href="${data.link.cad}" target="_blank">Modell öffnen</a>
      </div>
    `;

  } catch (error) {

    // 👉 Fehleranzeige
    contentDiv.innerHTML = `
      <p class="error">Fehler beim Laden der Daten</p>
      <p>${error.message}</p>
      <p>Prüfe:</p>
      <ul>
        <li>Existiert die Datei: data/${id}.json?</li>
        <li>Ist die URL korrekt?</li>
      </ul>
    `;
  }
}

// 👉 Start
loadData();
</script>

</body>
</html>
