<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BT Box – Produktstatus</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 40px;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 650px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 20px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #34495e;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
    }

    .ok { background: #27ae60; }
    .fail { background: #e74c3c; }

    input, select {
      padding: 6px;
      width: 100%;
      max-width: 300px;
      margin-top: 5px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    .success {
      color: green;
      font-size: 0.9em;
      margin-top: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 6px;
    }

    th {
      background: #ecf0f1;
    }
  </style>

</head>

<body>

<h1>🔊 BT Box – Produktstatus</h1>

<div id="content" class="card">Verbinde...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";
const contentDiv = document.getElementById("content");

db.collection("products").doc(id).onSnapshot(async (docSnap) => {

  if (!docSnap.exists) {
    contentDiv.innerHTML = "❌ Produkt nicht gefunden";
    return;
  }

  const data = docSnap.data();

  const statusClass =
    data.quality_status === "bestanden" ? "ok" : "fail";

  // Historie laden
  const historySnap = await db.collection("products")
    .doc(id)
    .collection("history")
    .orderBy("timestamp", "desc")
    .get();

  let historyHTML = "<table><tr><th>Zeit</th><th>Status</th><th>Benutzer</th></tr>";

  historySnap.forEach(doc => {
    const h = doc.data();
    historyHTML += `
      <tr>
        <td>${h.timestamp}</td>
        <td>${h.status}</td>
        <td>${h.user}</td>
      </tr>
    `;
  });

  historyHTML += "</table>";

  contentDiv.innerHTML = `
    <div class="section">
      <div class="title">Produkt</div>
      ID: ${data.product_id}<br>
      Version: ${data.version}
    </div>

    <div class="section">
      <div class="title">Aktueller Status</div>
      <span class="status ${statusClass}">
        ${data.quality_status}
      </span>
    </div>

    <div class="section">
      <div class="title">Letzte Änderung</div>
      ${data.last_update || "-"}<br>
      durch: ${data.last_user || "-"}
    </div>

    <div class="section">
      <div class="title">Status ändern</div>

      <input id="userInput" placeholder="Name eingeben">

      <select id="statusSelect">
        <option value="bestanden">bestanden</option>
        <option value="nicht bestanden">nicht bestanden</option>
      </select>

      <button id="saveBtn">Speichern</button>
      <div id="feedback" class="success"></div>
    </div>

    <div class="section">
      <div class="title">Historie</div>
      ${historyHTML}
    </div>
  `;

  document.getElementById("saveBtn").addEventListener("click", saveStatus);

});


async function saveStatus() {

  const btn = document.getElementById("saveBtn");
  const feedback = document.getElementById("feedback");

  const user = document.getElementById("userInput").value.trim();
  const status = document.getElementById("statusSelect").value;

  if (!user) {
    alert("Bitte Namen eingeben!");
    return;
  }

  const time = new Date().toLocaleString();

  btn.disabled = true;
  feedback.innerText = "Speichern...";

  const productRef = db.collection("products").doc(id);

  try {

    await productRef.update({
      quality_status: status,
      last_update: time,
      last_user: user
    });

    await productRef.collection("history").add({
      status: status,
      user: user,
      timestamp: time
    });

    feedback.innerText = "✔ Gespeichert";

  } catch (err) {
    alert("Fehler: " + err.message);
  }

  btn.disabled = false;
}

</script>

</body>
</html>
