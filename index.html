<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Produktstatus</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }
.card { background:white; padding:20px; border-radius:10px; max-width:700px; }

/*
.status { padding:5px 10px; border-radius:5px; color:white; font-weight:bold; }
.ok { background:#27ae60; }
.fail { background:#e74c3c; }
.inprogress { background:#f1c40f; color:black; }
*/

.history { display:none; margin-top:10px; }
.warning { color:#e67e22; font-size:0.9em; }

button {
  margin-top:10px;
}

.btn-primary {
  padding:8px 14px;
}

button:not(.btn-primary) {
  background:#ecf0f1;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:not(.btn-primary):hover {
  background:#dfe6e9;
}

.ready-text { color:#27ae60; font-weight:bold; margin-top:5px; }
.mode-text { color:#2980b9; font-weight:bold; margin-bottom:10px; }

/* 🔥 NEW: DATA UI */
.data-grid {
  display: grid;
  grid-template-columns: 30% 70%;
  gap: 15px;
  align-items: start;
}

.data-card {
  background:#f9fafb;
  padding:12px;
  border-radius:8px;
  border:1px solid #e0e0e0;
}

.data-title {
  font-weight:bold;
  margin-bottom:8px;
  color:#2c3e50;
}

.sub-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.sub-card {
  background:white;
  padding:10px;
  border-radius:6px;
  border:1px solid #ddd;
}

.data-btn {
  display:inline-block;
  margin-top:8px;
  padding:6px 10px;
  background:#3498db;
  color:white;
  text-decoration:none;
  border-radius:5px;
  font-size:12px;
  white-space:nowrap;
}

.step-card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border-left:6px solid #ddd;
}

.step-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.step-meta {
  font-size:0.9em;
  color:#555;
  margin-bottom:15px;
}

.substeps {
  margin-bottom:15px;
  line-height:1.8;
}

.actions {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.actions input,
.actions select {
  padding:6px;
}

.step-card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.step-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.progress-container {
  flex:1;
  margin:0 15px;
}

.progress-bar {
  height:10px;
  background:#e0e0e0;
  border-radius:5px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#27ae60;
  width:0%;
  transition:width 0.3s;
}

.progress-text {
  font-size:0.8em;
  text-align:right;
  margin-top:2px;
}

.substeps-inline {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin:10px 0;
}

.substep-item {
  display:flex;
  align-items:center;
  gap:5px;
}

.actions-row {
  display:flex;
  gap:10px;
  margin-top:10px;
  align-items:center;
}

/* 🔥 STATUS BADGES */
.badge {
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:bold;
  display:inline-block;
}

.badge-red {
  background:#e74c3c;
  color:white;
}

.badge-yellow {
  background:#f1c40f;
  color:black;
}

.badge-green {
  background:#27ae60;
  color:white;
}

.badge-blue {
  background:#3498db;
  color:white;
}

.progress-fill.done { background:#27ae60; }
.progress-fill.ready { background:#f1c40f; }
.progress-fill.progress { background:#3498db; }
.progress-fill.empty { background:#e74c3c; }

/* 🔥 PRIMARY ACTION BUTTON */
.btn-primary {
  background:#2c3e50;          /* dunkles Blau/Grau */
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
  transition:all 0.2s ease;
}

.btn-primary:hover {
  background:#1a252f;
  transform:translateY(-1px);
}

.btn-primary:disabled {
  background:#bdc3c7;
  cursor:not-allowed;
  transform:none;
}

/* optional: ready-Zustand leicht hervorheben */
.btn-primary.ready {
  border:2px solid #27ae60;
  box-shadow:0 0 0 2px rgba(39,174,96,0.2);
}

/* 🔥 TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #2c3e50;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success {
  background: #27ae60;
}

.toast.error {
  background: #e74c3c;
}
</style>
</head>

<body>

<h1>🔊 BT Box – Prozessstatus</h1>
<h2 id="productTitle"></h2>

<div style="margin-bottom:20px;">
  <a href="dashboard.html">⬅️ Zum Dashboard</a>
</div>

<div id="productData" class="card" style="margin-bottom:20px; display:none;"></div>

<div id="roleSelection" class="card">
  <h3>Rolle wählen</h3>
  <button onclick="selectRole('bearbeitung')">🛠 Bearbeitung</button>
  <button onclick="selectRole('pruefung')">🔍 Prüfung</button>
</div>

<div id="content" class="card">🔄 Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";

let role = null;
const contentDiv = document.getElementById("content");

const stepOrder = [
  "Konstruktion","Fertigung","Vormontage","Endmontage","Endabnahme"
];

const subStepsConfig = {

  "Konstruktion": [
    { id:"k_01", label:"3D-Modell" },
    { id:"k_02", label:"Zusammenbau" },
    { id:"k_03", label:"Technische Dokumente" }
  ],

  "Fertigung": [
    { id:"f_01", label:"3D-Druck" },
    { id:"f_02", label:"CNC-Bearbeitung" }
  ],

  "Vormontage": [
    { id:"vm_01", label:"Komponenten/Material vollständig" },
    { id:"vm_02", label:"Montage auf Montageplatte" },
    { id:"vm_03", label:"Elektrische Anschlussarbeiten" },
    { id:"vm_04", label:"Funktionskontrolle" }
  ],

  "Endmontage": [
    { id:"em_01", label:"Montage auf Komponentenplatine" },
    { id:"em_02", label:"Montage Gehäuse/Deckel" },
    { id:"em_03", label:"Elektrische Anschlussarbeiten" },
    { id:"em_04", label:"Funktionskontrolle 1" },
    { id:"em_05", label:"Zusammenbau" },
    { id:"em_06", label:"Funktionskontrolle 2" }
  ],

  "Endabnahme": [
    { id:"ea_01", label:"Funktionskontrolle" },
    { id:"ea_02", label:"Erscheinungsbild" },
    { id:"ea_03", label:"Freigabe" }
  ]
};

const displayConfig = {

  // 🔹 Basisdaten
  product_id: { show:true, label:"Produkt-ID", highlight:true },
  product_name: { show:false, label:"Produktname" },
  group_name: { show:false, label:"Gruppe" },
  version: { show:true, label:"Variante" },

  // 🔹 Fertigung
  manufacturing: { show:true, label:"Fertigung" },
  "3d_print": { show:true, label:"3D-Druck" },
  cnc: { show:true, label:"CNC" },

  // 🔹 Details
  component: { show:true, label:"Einzelteil" },
  material: { show:true, label:"Material" },
  layer_height: { show:true, label:"Schichthöhe" },
  perimeter: { show:true, label:"Perimeter" },
  infill: { show:true, label:"Infill" },

  // 🔹 Links
  link: { show:true, label:"Links" },
  cad: { show:true, label:"CAD-Modell" }
};

const displayOrder = [
  "product_id",
  "version",
  "manufacturing",
  "link"
];

// 🔥 LABEL HELPER
function getLabel(key){
  return displayConfig[key]?.label ||
    key.replace(/_/g," ")
       .replace(/\b\w/g,l=>l.toUpperCase());
}

function isVisible(key){
  return displayConfig[key]?.show !== false;
}

function getStatus(step, allDone, stepId, allStepsData){

  // 🔹 Endabnahme Sonderlogik
  if(stepId === "Endabnahme"){

    const readyForApproval = stepOrder
      .filter(s => s !== "Endabnahme")
      .every(s => allStepsData[s]?.status === "bestanden");

    if(step.status === "bestanden") return "done";

    if(readyForApproval) return "ready";

    if(Object.values(step.substeps || {}).some(v=>v)) return "progress";

    return "empty";
  }

  // 🔹 Standard
  if(step.status === "bestanden") return "done";
  if(allDone) return "ready";
  if(Object.values(step.substeps || {}).some(v=>v)) return "progress";
  return "empty";
}

function getStatusBadge(status){

  if(status === "done"){
    return `<span class="badge badge-green">✔ bestanden</span>`;
  }

  if(status === "ready"){
    return `<span class="badge badge-yellow">bereit zur Prüfung</span>`;
  }

  if(status === "progress"){
    return `<span class="badge badge-blue">in Arbeit</span>`;
  }

  return `<span class="badge badge-red">nicht begonnen</span>`;
}

function showToast(message, type="success"){

  const toast = document.getElementById("toast");

  toast.className = `toast ${type}`;
  toast.innerText = message;

  // trigger animation
  setTimeout(()=>toast.classList.add("show"), 10);

  // auto hide
  setTimeout(()=>{
    toast.classList.remove("show");
  }, 2500);
}


function selectRole(r){
  role=r;
  document.getElementById("roleSelection").style.display="none";
  contentDiv.style.display="block";
  contentDiv.scrollIntoView({ behavior: "smooth" });
  startApp();
}

async function loadProductName(){
  let productName = "Bluetooth-Box";
  let groupName = null;

  try {
    const res = await fetch(`data/${id}/${id}.json`);
    const json = await res.json();
    if (json.product_name) productName = json.product_name;
    if (json.group_name) groupName = json.group_name;
  } catch {}

  let html = `Produkt: <b>${productName}</b>`;
  if (groupName) html += `<br><small>Gruppe: ${groupName}</small>`;
  document.getElementById("productTitle").innerHTML = html;
}

function renderObject(obj, level = 0){

  let html = "";

  for(const key in obj){

    // 🔥 AUSBLENDEN
    if(!isVisible(key)) continue;

    const value = obj[key];
    const label = getLabel(key);

    if(typeof value === "object" && value !== null){

      html += `
        <div style="margin-left:${level*15}px; margin-top:6px;">
          <b>${label}</b><br>
          ${renderObject(value, level+1)}
        </div>
      `;

    } else {

      if(typeof value === "string" && value.startsWith("http")){

        html += `
          <div style="margin-left:${level*15}px;">
            ${label}: <a href="${value}" target="_blank">öffnen</a>
          </div>
        `;

      } else {

        html += `
          <div style="margin-left:${level*15}px;">
            ${label}: ${value}
          </div>
        `;

      }
    }
  }

  return html;
}


async function loadProductData(){

  const { group, cad, cnc, print } = await loadAllSources();

  let html = `<h3>📦 Produktdaten</h3>`;
  html += `<div class="data-grid">`;

  html += renderProductCard(cad);
  html += renderCadCard(cad);
  html += renderCncCard(group, cnc);
  html += renderPrintCard(group, print);

  html += `</div>`;

  document.getElementById("productData").innerHTML = html;
  document.getElementById("productData").style.display = "block";
}


function isStepUnlocked(stepId,data){
  const i = stepOrder.indexOf(stepId);
  if(i===0) return true;
  return data[stepOrder[i-1]]?.status==="bestanden";
}


async function initSteps(){
  const productRef = db.collection("products").doc(id);
  await productRef.set({created:true},{merge:true});

  await Promise.all(stepOrder.map(async step => {
    const ref = productRef.collection("steps").doc(step);
    const snap = await ref.get();

    if(!snap.exists){
      const substeps={};
      (subStepsConfig[step]||[]).forEach(s=>substeps[s.id]=false);

      return ref.set({
        status:"nicht bestanden",
        substeps,
        last_update:"",
        last_user:""
      });
    }
  }));
}

function listenSteps(){
  db.collection("products").doc(id)
    .collection("steps")
    .onSnapshot(snap => processSnapshot(snap));
}

function processSnapshot(snap){

  const allStepsData={};
  snap.docs.forEach(d=>allStepsData[d.id]=d.data());

  let html="";

  if(role==="pruefung"){
    html += `<div class="mode-text">🔍 Prüfmodus aktiv</div>`;
  }

  const orderedDocs = stepOrder.map(stepName =>
    snap.docs.find(d => d.id === stepName)
  ).filter(Boolean);

  orderedDocs.forEach(docSnap=>{

    const step = docSnap.data();
    const stepId = docSnap.id;
    const unlocked = isStepUnlocked(stepId,allStepsData);
    const config = subStepsConfig[stepId] || [];

    const substeps = {};
    config.forEach(item=>{
      substeps[item.id] = step.substeps?.[item.id] ?? false;
    });

    const allDone = Object.values(substeps).every(v=>v);
    const total = Object.keys(substeps).length;
    const done = Object.values(substeps).filter(v=>v).length;
    const percent = Math.round((done / total) * 100);
    const status = getStatus(step, allDone, stepId, allStepsData);
    const isEndabnahme = stepId === "Endabnahme";
    const isLocked = isEndabnahme && role !== "pruefung";
    const lockIcon = isEndabnahme
      ? (isLocked ? "🔒" : "🔓")
      : "";
    let subHTML = `<div class="substeps-inline">`;

    config.forEach(item=>{
      const val = substeps[item.id];

      subHTML += `
        <div class="substep-item">
          <input type="checkbox"
            ${val?"checked":""}
            ${(!unlocked || role==="pruefung" || stepId==="Endabnahme")?"disabled":""}
            onchange="toggleSub('${stepId}')">
          <span>${item.label}</span>
        </div>
      `;
    });

    subHTML += `</div>`;

html += `
<div class="step-card">

  <div class="step-top">
    <h3>
      ${lockIcon ? `<span>${lockIcon}</span>` : ""}
      ${stepId}
    </h3>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill ${status}" style="width:${percent}%"></div>
      </div>
      <div class="progress-text">${percent}%</div>
    </div>

    ${getStatusBadge(status)}
  </div>

  <div class="step-meta">
    ${step.last_update||"-"} / ${step.last_user||"-"}
  </div>

  ${!unlocked ? "<div class='warning'>Schritt gesperrt</div>" : ""}

  ${subHTML}

  ${(allDone && step.status !== "bestanden")
    ? `<div class="ready-text">✔ bereit zur Prüfung</div>`
    : ""}

  <div class="actions-row">
    <input id="user_${stepId}" placeholder="Name"
      ${(!unlocked || role!=="pruefung")?"disabled":""}>

    <select id="status_${stepId}"
      ${(!unlocked || role!=="pruefung")?"disabled":""}>
      <option value="nicht bestanden" ${!allDone ? "selected" : ""}>nicht bestanden</option>
      <option value="bestanden" ${allDone ? "" : "disabled"}>bestanden</option>
    </select>

  <button class="btn-primary ${allDone ? "ready" : ""}"
    onclick="saveStep('${stepId}')"
    ${(!unlocked || role!=="pruefung")?"disabled":""}>
    📤 Speichern
  </button>

    <button onclick="toggleHistory('${stepId}')">📜</button>
  </div>

  <div id="hist_${stepId}" class="history">Lade...</div>

</div>
`;

  });

  contentDiv.innerHTML=html;
}

async function toggleSub(stepId){
  if(role==="pruefung") return;

  const ref = db.collection("products").doc(id)
    .collection("steps").doc(stepId);

  const config = subStepsConfig[stepId];
  const checkboxes = document.querySelectorAll(`input[onchange*="${stepId}"]`);

  const sub = {};
  let i=0;

  for(const cb of checkboxes){
    sub[config[i].id] = cb.checked;
    i++;
  }

  await ref.update({ substeps: sub });
}

async function saveStep(stepId){

  if(role!=="pruefung") return alert("Nur Prüfung darf Status setzen");

  const user=document.getElementById("user_"+stepId).value.trim();
  const status=document.getElementById("status_"+stepId).value;

  if(!user) return alert("Bitte Namen eingeben!");

  const time=new Date().toLocaleString();

  const ref=db.collection("products").doc(id)
    .collection("steps").doc(stepId);

  await ref.update({
    status,
    last_update:time,
    last_user:user
  });

  await ref.collection("history").add({
    user,
    timestamp:time,
    status,
    role,
    action:"Status geändert"
  });

  const btn = document.querySelector(`button[onclick="saveStep('${stepId}')"]`);

  if(btn){
    const original = btn.innerText;

    btn.innerText = "✔ Gespeichert";
    btn.disabled = true;

    setTimeout(()=>{
      btn.innerText = original;
      btn.disabled = false;
    }, 2000);
  }

  showToast("✔ Gespeichert");
}


async function loadAllSources(){

  const base = `data/${id}`;

  let group = null;
  let cad = null;
  let cnc = null;
  let print = null;

  try {
    const res = await fetch(`${base}/${id}.json`);
    group = await res.json();
  } catch {}

  try {
    const res = await fetch(`${base}/cad/fusion-export.json`);
    cad = await res.json();
  } catch {}

  try {
    const res = await fetch(`${base}/cnc/cnc_statemonitor.json`);
    cnc = await res.json();
  } catch {}

  try {
    const res = await fetch(`${base}/3dprint/3dp_prusalink.json`);
    print = await res.json();
  } catch {}

  return { group, cad, cnc, print };
}


function renderProductCard(cad){

  if(!cad) return "";

  return `
    <div class="data-card">
      <div class="data-title">📦 Produkt</div>

      <b>${cad.productId}</b><br>
      Variante: ${cad.selectedComponent?.hinweis || "-"}<br>
      Komponente: ${cad.selectedComponent?.name || "-"}

    </div>
  `;
}


function renderCadCard(cad){

  if(!cad) return "";

  const comp = cad.components?.[0];
  if(!comp) return "";

  return `
    <div class="data-card">
      <div class="data-title">🧩 CAD</div>

      Material: ${(comp.materials || []).join(", ")}<br>
      Masse: ${comp.mass_g} g<br>
      Volumen: ${comp.volume_cm3} cm³<br>

      Hüllmaße:<br>
      ${comp.boundingBox_mm?.length} ×
      ${comp.boundingBox_mm?.width} ×
      ${comp.boundingBox_mm?.height} mm

    </div>
  `;
}


function renderCncCard(group, cnc){

  return `
    <div class="data-card">
      <div class="data-title">⚙️ CNC</div>

      <b>Vorgaben:</b><br>
      Maschine: ${group?.manufacturing?.cnc?.machine || "-"}<br>
      Werkzeug: ${group?.manufacturing?.cnc?.tool || "-"}<br>

      <br>

      <b>Live:</b><br>
      Drehzahl: ${cnc?.cnc?.speed || "-"}<br>
      Vorschub: ${cnc?.cnc?.feed || "-"}<br>
      Tool: ${cnc?.cnc?.tool || "-"}

    </div>
  `;
}


function renderPrintCard(group, print){

  return `
    <div class="data-card">
      <div class="data-title">🖨️ 3D-Druck</div>

      <b>Vorgaben:</b><br>
      Layer: ${group?.manufacturing?.["3d_print"]?.layer_height || "-"}<br>
      Infill: ${group?.manufacturing?.["3d_print"]?.infill || "-"}<br>

      <br>

      <b>Status:</b><br>
      ${print?.state || "keine Daten"}

    </div>
  `;
}


async function toggleHistory(stepId){

  const div = document.getElementById("hist_"+stepId);

  if(div.style.display==="block"){
    div.style.display="none";
    return;
  }

  div.style.display="block";
  div.innerHTML="Lade...";

  const snap = await db.collection("products")
    .doc(id).collection("steps")
    .doc(stepId).collection("history")
    .orderBy("timestamp","desc").limit(10).get();

  let html="<table><tr><th>Zeit</th><th>User</th><th>Status</th><th>Aktion</th></tr>";

  snap.forEach(d=>{
    const h=d.data();
    html+=`<tr>
      <td>${h.timestamp}</td>
      <td>${h.user}</td>
      <td>${h.status||"-"}</td>
      <td>${h.action}</td>
    </tr>`;
  });

  html+="</table>";
  div.innerHTML=html;
}

// START
initSteps();
loadProductName();
loadProductData();

function startApp(){
  listenSteps();
}

contentDiv.style.display="none";

</script>
<div id="toast" class="toast"></div>
</body>
</html>
