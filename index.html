<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Produktdaten - BT Box</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f6f8;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 15px;
    }

    .label {
      font-weight: bold;
      color: #34495e;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-weight: bold;
    }
  </style>

  <!-- 🔥 Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
      authDomain: "i40-btbox.firebaseapp.com",
      projectId: "i40-btbox",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // global verfügbar machen
    window.db = db;
    window.doc = doc;
    window.getDoc = getDoc;
    window.updateDoc = updateDoc;
  </script>

</head>

<body>

<h1>Produktdaten</h1>

<div id="content" class="card">
  Lade Daten...
</div>

<script>

async function loadData() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || "id001";

  const contentDiv = document.getElementById("content");

  try {
    const ref = window.doc(window.db, "products", id);
    const snap = await window.getDoc(ref);

    if (!snap.exists()) {
      throw new Error("Produkt nicht gefunden");
    }

    const data = snap.data();

    // Fallbacks (robust!)
    const productId = data.product_id || "unbekannt";
    const version = data.version || "unbekannt";
    const status = data.quality_status || "unbekannt";

    contentDiv.innerHTML = `
      <div class="section">
        <span class="label">Produkt-ID:</span> ${productId}
      </div>

      <div class="section">
        <span class="label">Version:</span> ${version}
      </div>

      <div class="section">
        <span class="label">Qualität:</span><br>

        <select id="statusSelect">
          <option value="bestanden" ${status === "bestanden" ? "selected" : ""}>bestanden</option>
          <option value="nicht bestanden" ${status === "nicht bestanden" ? "selected" : ""}>nicht bestanden</option>
        </select>

        <br>
        <button onclick="saveStatus('${id}')">Speichern</button>
      </div>
    `;

  } catch (error) {

    contentDiv.innerHTML = `
      <p class="error">Fehler beim Laden</p>
      <p>${error.message}</p>
    `;
  }
}


// 🔧 Speichern in Firebase
async function saveStatus(id) {

  const status = document.getElementById("statusSelect").value;

  try {
    const ref = window.doc(window.db, "products", id);

    await window.updateDoc(ref, {
      quality_status: status
    });

    alert("Status erfolgreich in Cloud gespeichert!");

    // 🔥 UI neu laden → sofort sichtbar
    loadData();

  } catch (error) {
    alert("Fehler beim Speichern: " + error.message);
  }
}


// Start
loadData();

</script>

</body>
</html>
