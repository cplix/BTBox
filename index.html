<!DOCTYPE html>
<html>
<head>
  <title>Produktdaten</title>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
    authDomain: "i40-btbox.firebaseapp.com",
    projectId: "i40-btbox",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.doc = doc;
  window.getDoc = getDoc;
  window.updateDoc = updateDoc;
  </script>
</head>
<body>

<h1>Produktdaten</h1>
<div id="content"></div>

<script>
async function loadData() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || "id001";

  const contentDiv = document.getElementById("content");

  try {
    const ref = window.doc(window.db, "products", id);
    const snap = await window.getDoc(ref);

    if (!snap.exists()) {
      throw new Error("Produkt nicht gefunden");
    }

    const data = snap.data();

    contentDiv.innerHTML = `
      <p><b>ID:</b> ${data.product_id}</p>
      <p><b>Version:</b> ${data.version}</p>

      <p><b>Qualität:</b></p>
      <select id="statusSelect">
        <option value="bestanden" ${data.quality_status === "bestanden" ? "selected" : ""}>bestanden</option>
        <option value="nicht bestanden" ${data.quality_status === "nicht bestanden" ? "selected" : ""}>nicht bestanden</option>
      </select>

      <button onclick="saveStatus('${id}')">Speichern</button>
    `;

  } catch (error) {
    contentDiv.innerHTML = `<p>${error.message}</p>`;
  }
}

async function saveStatus(id) {
  const status = document.getElementById("statusSelect").value;

  const ref = window.doc(window.db, "products", id);

  await window.updateDoc(ref, {
    quality_status: status
  });

  alert("Status in Cloud gespeichert!");
}

loadData();
</script>

</body>
</html>
