<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BT Box – Produktstatus</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f8; margin:40px; }
    h1 { color:#2c3e50; }

    .card {
      background:white; padding:20px; border-radius:10px;
      max-width:700px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .section { margin-bottom:25px; }

    .status {
      padding:5px 10px; border-radius:5px; color:white;
      font-weight:bold;
    }

    .ok { background:#27ae60; }
    .fail { background:#e74c3c; }
    .inprogress { background:#f1c40f; color:black; }

    input, select {
      padding:6px; margin-top:5px; width:100%; max-width:300px;
    }

    button {
      margin-top:10px; padding:8px 14px;
      background:#3498db; color:white; border:none;
      border-radius:5px; cursor:pointer;
    }

    button:disabled {
      background:#aaa;
      cursor:not-allowed;
    }

    .warning {
      color:#e67e22;
      font-size:0.9em;
      margin-top:5px;
    }

    .roleinfo {
      font-size:0.9em;
      margin-bottom:10px;
      color:#555;
    }

    #roleSelection {
      text-align:center;
    }

    #roleSelection button {
      margin:10px;
      width:220px;
    }

    table { width:100%; border-collapse:collapse; margin-top:10px; }
    td, th { border:1px solid #ddd; padding:5px; }
  </style>
</head>

<body>

<h1>🔊 BT Box – Prozessstatus</h1>
<h2 id="productTitle"></h2>
<div id="roleInfo" class="roleinfo"></div>

<div style="margin-bottom:20px;">
  <a href="dashboard.html">⬅️ Zum Dashboard</a>
</div>

<!-- 🔥 Rollenauswahl -->
<div id="roleSelection" class="card">
  <h3>Rolle wählen</h3>
  <button onclick="selectRole('bearbeitung')">🛠 Bearbeitung</button>
  <button onclick="selectRole('pruefung')">🔍 Prüfung (nur lesen)</button>
</div>

<div id="content" class="card">Verbinde...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "id001";

let role = null;

const contentDiv = document.getElementById("content");


// 🔥 Produktname
async function loadProductName() {
  try {
    const snap = await db.collection("products").doc(id).get();
    const data = snap.data() || {};
    const name = data.name || id;

    document.getElementById("productTitle").innerHTML =
      "Produkt: <b>" + name + "</b> (" + id + ")";
  } catch {
    document.getElementById("productTitle").innerHTML =
      "Produkt: <b>" + id + "</b>";
  }
}


// 🔥 Rolle wählen
function selectRole(selectedRole) {

  role = selectedRole;

  document.getElementById("roleSelection").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("roleInfo").innerHTML =
    role === "bearbeitung"
      ? "🛠 Rolle: Bearbeitung (Änderungen erlaubt)"
      : "🔍 Rolle: Prüfung (nur Lesen)";

  startApp();
}


const stepOrder = [
  "Konstruktion",
  "Fertigung",
  "Vormontage",
  "Endmontage",
  "Endabnahme"
];

const subStepsConfig = {
  "Konstruktion": ["3D-Modell","Zusammenbau","Technische Dokumente"],
  "Fertigung": ["3D-Druck","CNC-Bearbeitung"],
  "Vormontage": [],
  "Endmontage": [],
  "Endabnahme": []
};


function isStepUnlocked(stepId, allStepsData) {
  const index = stepOrder.indexOf(stepId);
  if (index === 0) return true;

  const prevStep = stepOrder[index - 1];
  return allStepsData[prevStep]?.status === "bestanden";
}


// 🔧 Initialisierung
async function initSteps() {

  const productRef = db.collection("products").doc(id);
  await productRef.set({ created: true }, { merge: true });

  for (const step of stepOrder) {

    const ref = productRef.collection("steps").doc(step);
    const snap = await ref.get();

    const substeps = {};
    (subStepsConfig[step] || []).forEach(s => substeps[s] = false);

    if (!snap.exists) {
      await ref.set({
        name: step,
        status: "nicht bestanden",
        last_update: "",
        last_user: "",
        substeps: substeps
      });
    } else {
      const data = snap.data() || {};
      if (!data.substeps) {
        await ref.update({ substeps: substeps });
      }
    }
  }
}


// 🔥 Anzeige
function listenSteps() {

  db.collection("products").doc(id)
    .collection("steps")
    .onSnapshot(async (snapshot) => {

      const docs = snapshot.docs;

      const allStepsData = {};
      docs.forEach(doc => {
        allStepsData[doc.id] = doc.data();
      });

      let completed = docs.filter(d => d.data().status === "bestanden").length;
      let percent = Math.round((completed / stepOrder.length) * 100);

      let html = `
        <div style="margin-bottom:20px;">
          <b>Fortschritt: ${completed} / ${stepOrder.length}</b>
          <div style="background:#ddd;height:20px;border-radius:5px;">
            <div style="width:${percent}%;background:#27ae60;height:100%;color:white;text-align:center;">
              ${percent}%
            </div>
          </div>
        </div>
      `;

      docs.sort((a,b) =>
        stepOrder.indexOf(a.id) - stepOrder.indexOf(b.id)
      );

      for (const docSnap of docs) {

        const step = docSnap.data();
        const stepId = docSnap.id;
        const isUnlocked = isStepUnlocked(stepId, allStepsData);

        let statusClass = "fail";
        let statusText = "nicht bestanden";

        if (step.status === "bestanden") {
          statusClass = "ok";
          statusText = "bestanden";
        } else if (step.substeps && Object.values(step.substeps).some(v => v)) {
          statusClass = "inprogress";
          statusText = "in Arbeit";
        }

        let substepsHTML = "";
        let i = 1;

        for (const key of subStepsConfig[stepId] || []) {

          const val = step.substeps && key in step.substeps
            ? step.substeps[key]
            : false;

          substepsHTML += `
            <label>
              ${i}.
              <input type="checkbox"
                ${val ? "checked":""}
                ${(!isUnlocked || role === "pruefung") ? "disabled":""}
                onchange="toggleSubstep('${stepId}','${key}',this.checked)">
              ${key}
            </label><br>
          `;
          i++;
        }

        html += `
          <div class="section">

            <h3>${stepId}</h3>

            <span class="status ${statusClass}">
              ${statusText}
            </span>

            <div>
              ${step.last_update || "-"} / ${step.last_user || "-"}
            </div>

            ${!isUnlocked ? "<div class='warning'>⚠️ Vorheriger Schritt nicht abgeschlossen</div>" : ""}

            <div><h4>Unterpunkte</h4>${substepsHTML}</div>

            <div>
              <input id="user_${stepId}" placeholder="Name" ${( !isUnlocked || role === "pruefung") ? "disabled":""}>
              <select id="status_${stepId}" ${( !isUnlocked || role === "pruefung") ? "disabled":""}>
                <option value="bestanden">bestanden</option>
                <option value="nicht bestanden">nicht bestanden</option>
              </select>
              <button onclick="saveStep('${stepId}')" ${( !isUnlocked || role === "pruefung") ? "disabled":""}>Speichern</button>
            </div>

          </div>
          <hr>
        `;
      }

      contentDiv.innerHTML = html;
    });
}


// 🔧 Substeps
async function toggleSubstep(stepId, key, value) {

  if (role === "pruefung") return;

  const ref = db.collection("products")
    .doc(id).collection("steps").doc(stepId);

  const snap = await ref.get();
  const data = snap.data();

  const substeps = data.substeps || {};
  substeps[key] = value;

  const allDone = Object.values(substeps).every(v => v);

  let newStatus = data.status;
  if (!allDone && data.status === "bestanden") {
    newStatus = "nicht bestanden";
  }

  await ref.update({ substeps, status: newStatus });
}


// 🔧 Speichern
async function saveStep(stepId) {

  if (role === "pruefung") {
    alert("Keine Änderungen in der Prüfrolle erlaubt!");
    return;
  }

  const user = document.getElementById(`user_${stepId}`).value.trim();
  const status = document.getElementById(`status_${stepId}`).value;

  if (!user) return alert("Bitte Namen eingeben!");

  const snapshot = await db.collection("products")
    .doc(id).collection("steps").get();

  const allStepsData = {};
  snapshot.forEach(doc => {
    allStepsData[doc.id] = doc.data();
  });

  if (!isStepUnlocked(stepId, allStepsData)) {
    return alert("Vorheriger Schritt nicht abgeschlossen!");
  }

  const ref = db.collection("products")
    .doc(id).collection("steps").doc(stepId);

  const snap = await ref.get();
  const data = snap.data();

  if (data.substeps) {
    const allDone = Object.values(data.substeps).every(v => v);
    if (!allDone && status === "bestanden") {
      return alert("Alle Unterpunkte müssen erledigt sein!");
    }
  }

  const time = new Date().toLocaleString();

  await ref.update({
    status,
    last_update: time,
    last_user: user
  });

  await ref.collection("history").add({
    status,
    user,
    timestamp: time
  });
}


// 🔥 Start
function startApp() {
  initSteps()
    .then(() => {
      loadProductName();
      listenSteps();
    })
    .catch(err => {
      contentDiv.innerHTML = "❌ Fehler: " + err.message;
      console.error(err);
    });
}

document.getElementById("content").style.display = "none";

</script>

</body>
</html>
