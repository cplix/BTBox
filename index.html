<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BT Box – Produktstatus</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; background:#f4f6f8; margin:40px; }
    h1 { color:#2c3e50; }

    .card {
      background:white; padding:20px; border-radius:10px;
      max-width:700px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .section { margin-bottom:25px; }

    .status {
      padding:5px 10px; border-radius:5px; color:white;
      font-weight:bold;
    }

    .ok { background:#27ae60; }
    .fail { background:#e74c3c; }
    .inprogress { background:#f1c40f; color:black; }

    .quality-ok { color:#27ae60; font-weight:bold; }
    .quality-fail { color:#e74c3c; font-weight:bold; }

    input, select {
      padding:6px; margin-top:5px; width:100%; max-width:300px;
    }

    button {
      margin-top:10px; padding:6px 12px;
      background:#3498db; color:white; border:none;
      border-radius:5px; cursor:pointer;
    }

    .history {
      margin-top:10px;
      display:none;
    }

    table { width:100%; border-collapse:collapse; margin-top:10px; }
    td, th { border:1px solid #ddd; padding:5px; }
  </style>
</head>

<body>

<h1>🔊 BT Box – Prozessstatus</h1>
<h2 id="productTitle"></h2>

<div id="roleSelection" class="card">
  <h3>Rolle wählen</h3>
  <button onclick="selectRole('bearbeitung')">🛠 Bearbeitung</button>
  <button onclick="selectRole('pruefung')">🔍 Prüfung</button>
</div>

<div id="content" class="card">Verbinde...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";

let role = null;
const contentDiv = document.getElementById("content");


// 🔥 Rolle wählen
function selectRole(r) {
  role = r;
  document.getElementById("roleSelection").style.display = "none";
  contentDiv.style.display = "block";
  startApp();
}


// 🔥 Produktname
async function loadProductName() {
  const snap = await db.collection("products").doc(id).get();
  const data = snap.data() || {};
  document.getElementById("productTitle").innerHTML =
    `Produkt: <b>${data.name || id}</b> (${id})`;
}


// 🔥 Anzeige
function listenSteps() {

  db.collection("products").doc(id)
    .collection("steps")
    .onSnapshot((snapshot) => {

      let html = "";

      snapshot.docs.forEach(docSnap => {

        const step = docSnap.data();
        const stepId = docSnap.id;

        const statusClass =
          step.status === "bestanden" ? "ok" :
          (step.substeps && Object.values(step.substeps).some(v => v)) ? "inprogress" :
          "fail";

        html += `
          <div class="section">

            <h3>${stepId}</h3>

            <span class="status ${statusClass}">
              ${step.status}
            </span>

            <div>${step.last_update || "-"} / ${step.last_user || "-"}</div>

            <button onclick="toggleHistory('${stepId}')">
              📜 Historie anzeigen
            </button>

            <div id="history_${stepId}" class="history">
              Lade...
            </div>

          </div>
          <hr>
        `;
      });

      contentDiv.innerHTML = html;
    });
}


// 🔥 HISTORIE ON DEMAND
async function toggleHistory(stepId) {

  const div = document.getElementById(`history_${stepId}`);

  // toggle
  if (div.style.display === "block") {
    div.style.display = "none";
    return;
  }

  div.style.display = "block";
  div.innerHTML = "Lade...";

  const snap = await db.collection("products")
    .doc(id)
    .collection("steps")
    .doc(stepId)
    .collection("history")
    .orderBy("timestamp", "desc")
    .limit(10)
    .get();

  let html = "<table><tr><th>Zeit</th><th>User</th><th>Aktion</th></tr>";

  snap.forEach(doc => {
    const d = doc.data();
    html += `
      <tr>
        <td>${d.timestamp}</td>
        <td>${d.user}</td>
        <td>${d.action}</td>
      </tr>
    `;
  });

  html += "</table>";

  div.innerHTML = html;
}


// Start
function startApp() {
  loadProductName();
  listenSteps();
}

contentDiv.style.display = "none";

</script>

</body>
</html>
