<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BT Box – Produktstatus</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 40px;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 650px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .section {
      margin-bottom: 20px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #34495e;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
    }

    .ok { background: #27ae60; }
    .fail { background: #e74c3c; }

    input, select {
      padding: 6px;
      width: 100%;
      max-width: 300px;
      margin-top: 5px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    .success {
      color: green;
      font-size: 0.9em;
      margin-top: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 6px;
    }

    th {
      background: #ecf0f1;
    }
  </style>

</head>

<body>

<h1>🔊 BT Box – Produktstatus</h1>

<div id="content" class="card">Verbinde...</div>

<script>

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";
const contentDiv = document.getElementById("content");

const steps = [
  "Konstruktion",
  "Fertigung",
  "Vormontage",
  "Endmontage",
  "Endabnahme"
];


// 🔥 Initialisierung (falls noch nicht vorhanden)
async function initSteps() {

  for (const step of steps) {

    const ref = db.collection("products").doc(id)
      .collection("steps").doc(step);

    const snap = await ref.get();

    if (!snap.exists) {
      await ref.set({
        name: step,
        status: "nicht bestanden",
        last_update: "",
        last_user: ""
      });
    }
  }
}


// 🔥 Realtime Anzeige
function listenSteps() {

  db.collection("products").doc(id)
    .collection("steps")
    .onSnapshot(async (snapshot) => {

      let html = "";

      for (const doc of snapshot.docs) {

        const step = doc.data();
        const stepId = doc.id;

        const statusClass =
          step.status === "bestanden" ? "ok" : "fail";

        // 🔥 Historie laden
        const histSnap = await db.collection("products")
          .doc(id)
          .collection("steps")
          .doc(stepId)
          .collection("history")
          .orderBy("timestamp", "desc")
          .get();

        let histHTML = "<table><tr><th>Zeit</th><th>Status</th><th>User</th></tr>";

        histSnap.forEach(h => {
          const d = h.data();
          histHTML += `
            <tr>
              <td>${d.timestamp}</td>
              <td>${d.status}</td>
              <td>${d.user}</td>
            </tr>
          `;
        });

        histHTML += "</table>";

        html += `
          <div class="section">

            <h3>${step.name}</h3>

            <div>
              <span class="status ${statusClass}">
                ${step.status}
              </span>
            </div>

            <div>
              Letzte Änderung:<br>
              ${step.last_update || "-"}<br>
              durch: ${step.last_user || "-"}
            </div>

            <div>
              <input id="user_${stepId}" placeholder="Name">
              
              <select id="status_${stepId}">
                <option value="bestanden">bestanden</option>
                <option value="nicht bestanden">nicht bestanden</option>
              </select>

              <button onclick="saveStep('${stepId}')">
                Speichern
              </button>
            </div>

            <div>
              <b>Historie</b>
              ${histHTML}
            </div>

          </div>
          <hr>
        `;
      }

      contentDiv.innerHTML = html;
    });
}


// 🔧 Speichern pro Schritt
async function saveStep(stepId) {

  const user = document.getElementById(`user_${stepId}`).value.trim();
  const status = document.getElementById(`status_${stepId}`).value;

  if (!user) {
    alert("Bitte Namen eingeben!");
    return;
  }

  const time = new Date().toLocaleString();

  const ref = db.collection("products")
    .doc(id)
    .collection("steps")
    .doc(stepId);

  await ref.update({
    status: status,
    last_update: time,
    last_user: user
  });

  await ref.collection("history").add({
    status: status,
    user: user,
    timestamp: time
  });
}


// Start
initSteps().then(() => listenSteps());

</script>

</body>
</html>
