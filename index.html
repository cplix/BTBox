<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Produktdaten - BT Box</title>

  <!-- Firebase (klassisch & stabil) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f6f8;
    }

    h1 {
      color: #2c3e50;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    .section {
      margin-bottom: 15px;
    }

    .label {
      font-weight: bold;
      color: #34495e;
    }

    .status {
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 5px;
    }

    .ok {
      color: white;
      background-color: green;
    }

    .fail {
      color: white;
      background-color: red;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<h1>Produktdaten</h1>

<div id="content" class="card">Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox",
};

// Initialisieren
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


async function loadData() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id") || "id001";

  const contentDiv = document.getElementById("content");

  try {

    const docRef = db.collection("products").doc(id);
    const docSnap = await docRef.get();

    if (!docSnap.exists) {
      contentDiv.innerHTML = "❌ Produkt nicht gefunden";
      return;
    }

    const data = docSnap.data();

    const status = data.quality_status || "unbekannt";

    const statusClass =
      status === "bestanden" ? "ok" :
      status === "nicht bestanden" ? "fail" : "";

    contentDiv.innerHTML = `
      <div class="section">
        <span class="label">Produkt-ID:</span> ${data.product_id}
      </div>

      <div class="section">
        <span class="label">Version:</span> ${data.version}
      </div>

      <div class="section">
        <span class="label">Aktueller Status:</span><br>
        <span class="status ${statusClass}">
          ${status}
        </span>
      </div>

      <div class="section">
        <span class="label">Status ändern:</span><br>

        <select id="statusSelect">
          <option value="bestanden" ${status === "bestanden" ? "selected" : ""}>bestanden</option>
          <option value="nicht bestanden" ${status === "nicht bestanden" ? "selected" : ""}>nicht bestanden</option>
        </select>

        <br>
        <button onclick="saveStatus('${id}')">Speichern</button>
      </div>

      <div class="section">
        <span class="label">Letzte Änderung:</span><br>
        ${data.last_update || "keine Angabe"}
      </div>
    `;

  } catch (error) {
    contentDiv.innerHTML = "❌ Fehler: " + error.message;
  }
}


// 🔧 Speichern inkl. Zeitstempel
async function saveStatus(id) {

  const status = document.getElementById("statusSelect").value;

  try {

    await db.collection("products").doc(id).update({
      quality_status: status,
      last_update: new Date().toLocaleString()
    });

    alert("✔ Status gespeichert");

    loadData(); // neu laden → sofort sichtbar

  } catch (error) {
    alert("❌ Fehler: " + error.message);
  }
}


loadData();

</script>

</body>
</html>
