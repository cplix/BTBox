<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>BT Box – Produktstatus</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:40px; }
.card { background:white; padding:20px; border-radius:10px; max-width:700px; }

.status { padding:5px 10px; border-radius:5px; color:white; font-weight:bold; }
.ok { background:#27ae60; }
.fail { background:#e74c3c; }
.inprogress { background:#f1c40f; color:black; }

.history { display:none; margin-top:10px; }
.warning { color:#e67e22; font-size:0.9em; }

button { margin-top:10px; padding:6px 12px; }
</style>
</head>

<body>

<h1>🔊 BT Box – Prozessstatus</h1>
<h2 id="productTitle"></h2>

<div style="margin-bottom:20px;">
  <a href="dashboard.html">⬅️ Zum Dashboard</a>
</div>

<div id="productData" class="card" style="margin-bottom:20px; display:none;"></div>

<div id="roleSelection" class="card">
  <h3>Rolle wählen</h3>
  <button onclick="selectRole('bearbeitung')">🛠 Bearbeitung</button>
  <button onclick="selectRole('pruefung')">🔍 Prüfung</button>
</div>

<div id="content" class="card">🔄 Lade Daten...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAf4taN1T3l75PHuoTc-5Y4T62ED2Om1TA",
  authDomain: "i40-btbox.firebaseapp.com",
  projectId: "i40-btbox"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const id = new URLSearchParams(window.location.search).get("id") || "id001";

let role = null;
const contentDiv = document.getElementById("content");

const stepOrder = [
  "Konstruktion","Fertigung","Vormontage","Endmontage","Endabnahme"
];

const subStepsConfig = {
  "Konstruktion": ["3D-Modell","Zusammenbau","Technische Dokumente"],
  "Fertigung": ["3D-Druck","CNC-Bearbeitung"],
  "Vormontage": [],
  "Endmontage": [],
  "Endabnahme": []
};

function selectRole(r){
  role=r;
  document.getElementById("roleSelection").style.display="none";
  contentDiv.style.display="block";
  contentDiv.scrollIntoView({ behavior: "smooth" });
  startApp();
}

// 🔥 Produktname
async function loadProductName(){

  let productName = "Bluetooth-Box"; // Default
  let groupName = null;

  // 🔥 JSON zuerst versuchen (richtige Quelle!)
  try {
    const res = await fetch(`data/${id}.json`);
    if (res.ok) {
      const json = await res.json();

      if (json.product_name) {
        productName = json.product_name;
      }

      if (json.group_name) {
        groupName = json.group_name;
      }
    }
  } catch {}

  // 🔥 Fallback: Firestore (falls dort mal gepflegt)
  const snap = await db.collection("products").doc(id).get();
  const d = snap.data() || {};

  if (d.name) {
    productName = d.name;
  }

  // 🔥 Anzeige bauen
  let html = `Produkt: <b>${productName}</b> (${id})`;

  if (groupName) {
    html += `<br><small>Gruppe: ${groupName}</small>`;
  }

  document.getElementById("productTitle").innerHTML = html;
}

//
// 🔥 NEU: HYBRID RENDERER MIT LABELMAP
//

const labelMap = {
  manufacturing: "Fertigung",
  "3d_print": "3D-Druck",
  cnc: "CNC",
  component: "Bauteil",
  material: "Material",
  layer_height: "Layerhöhe",
  perimeter: "Perimeter",
  infill: "Infill",
  link: "Links",
  cad: "CAD-Link",
  version: "Version"
};

function getLabel(key){
  return labelMap[key] ||
    key.replace(/_/g, " ")
       .replace(/\b\w/g, l => l.toUpperCase());
}

// 🔁 HYBRID RENDERING
function renderObject(obj, level = 0){

  let html = "";

  for(const key in obj){

    const value = obj[key];
    const label = getLabel(key);

    if(typeof value === "object" && value !== null){

      html += `
        <div style="margin-left:${level * 15}px; margin-top:8px;">
          <b>${label}</b><br>
          ${renderObject(value, level + 1)}
        </div>
      `;

    } else {

      if(typeof value === "string" && value.startsWith("http")){
        html += `
          <div style="margin-left:${level * 15}px;">
            ${label}: <a href="${value}" target="_blank">öffnen</a>
          </div>
        `;
      } else {
        html += `
          <div style="margin-left:${level * 15}px;">
            ${label}: ${value}
          </div>
        `;
      }
    }
  }

  return html;
}

// 📦 JSON laden
async function loadProductData(){

  try {
    const res = await fetch(`data/${id}.json`);
    if (!res.ok) throw new Error();

    const d = await res.json();

    let html = `<h3>📦 Produktdaten</h3>`;
    html += renderObject(d);

    const div = document.getElementById("productData");
    div.innerHTML = html;
    div.style.display = "block";

  } catch {}
}

function isStepUnlocked(stepId,data){
  const i = stepOrder.indexOf(stepId);
  if(i===0) return true;
  return data[stepOrder[i-1]]?.status==="bestanden";
}

// 🚀 INIT
async function initSteps(){

  const productRef = db.collection("products").doc(id);
  await productRef.set({created:true},{merge:true});

  await Promise.all(stepOrder.map(async step => {

    const ref = productRef.collection("steps").doc(step);
    const snap = await ref.get();

    if(!snap.exists){
      const substeps={};
      (subStepsConfig[step]||[]).forEach(s=>substeps[s]=false);

      return ref.set({
        status:"nicht bestanden",
        substeps,
        last_update:"",
        last_user:""
      });
    }

  }));
}

// 🔥 REST UNVERÄNDERT
// (listenSteps, toggleSub, saveStep, toggleHistory bleiben exakt gleich)

function listenSteps(){

  db.collection("products").doc(id)
    .collection("steps")
    .onSnapshot(async snap=>{

      const allStepsData={};
      snap.docs.forEach(d=>allStepsData[d.id]=d.data());

      const endabnahme = allStepsData["Endabnahme"];
      const productRef = db.collection("products").doc(id);

      const newStatus =
        (endabnahme && endabnahme.status==="bestanden")
          ? "freigegeben"
          : "nicht freigegeben";

      const productSnap = await productRef.get();
      const current = productSnap.data()?.quality_status;

      if(current !== newStatus){
        await productRef.set({
          quality_status:newStatus,
          quality_date:endabnahme?.last_update||"",
          quality_user:endabnahme?.last_user||""
        },{merge:true});
      }

      let html="";

      const orderedDocs = stepOrder.map(stepName =>
        snap.docs.find(d => d.id === stepName)
      ).filter(Boolean);

      orderedDocs.forEach(docSnap=>{

        const step = docSnap.data();
        const stepId = docSnap.id;
        const unlocked = isStepUnlocked(stepId,allStepsData);

        let statusClass="fail";
        if(step.status==="bestanden") statusClass="ok";
        else if(step.substeps && Object.values(step.substeps).some(v=>v))
          statusClass="inprogress";

        let subHTML="";
        let i=1;

        (subStepsConfig[stepId]||[]).forEach(key=>{
          const val = step.substeps?.[key]||false;

          subHTML += `
            ${i}.
            <input type="checkbox"
              ${val?"checked":""}
              ${(!unlocked || role==="pruefung")?"disabled":""}
              onchange="toggleSub('${stepId}','${key}',this.checked)">
            ${key}<br>
          `;
          i++;
        });

        html += `
        <div>
          <h3>${stepId}</h3>
          <span class="status ${statusClass}">${step.status}</span>
          <div>${step.last_update||"-"} / ${step.last_user||"-"}</div>
          ${!unlocked ? "<div class='warning'>Schritt gesperrt</div>" : ""}
          <div>${subHTML}</div>

          <input id="user_${stepId}" placeholder="Name" ${(!unlocked||role==="pruefung")?"disabled":""}>
          <select id="status_${stepId}" ${(!unlocked||role==="pruefung")?"disabled":""}>
            <option>bestanden</option>
            <option>nicht bestanden</option>
          </select>

          <button onclick="saveStep('${stepId}')" ${(!unlocked||role==="pruefung")?"disabled":""}>
            Speichern
          </button>

          <br>
          <button onclick="toggleHistory('${stepId}')">📜 Historie</button>
          <div id="hist_${stepId}" class="history">Lade...</div>
        </div><hr>
        `;
      });

      contentDiv.innerHTML=html;
    });
}

async function saveStep(stepId){

  if(role==="pruefung") return alert("Keine Änderung erlaubt");

  const user=document.getElementById("user_"+stepId).value.trim();
  const status=document.getElementById("status_"+stepId).value;

  if(!user){
    return alert("Bitte Namen eingeben!");
  }

  const ref=db.collection("products").doc(id)
    .collection("steps").doc(stepId);

  const snap = await ref.get();
  const data = snap.data();

  if(data.substeps){
    const allDone = Object.values(data.substeps).every(v=>v);
    if(!allDone && status==="bestanden"){
      return alert("Alle Unterpunkte müssen erledigt sein!");
    }
  }

  const time=new Date().toLocaleString();

  await ref.update({
    status,
    last_update:time,
    last_user:user
  });

  await ref.collection("history").add({
    user,
    timestamp:time,
    status,
    role,
    action:"Status geändert"
  });

  alert("✔️ Gespeichert");
}

async function toggleHistory(stepId){

  const div = document.getElementById("hist_"+stepId);

  if(div.style.display==="block"){
    div.style.display="none";
    return;
  }

  div.style.display="block";
  div.innerHTML="Lade...";

  const snap = await db.collection("products")
    .doc(id).collection("steps")
    .doc(stepId).collection("history")
    .orderBy("timestamp","desc").limit(10).get();

  let html="<table><tr><th>Zeit</th><th>User</th><th>Status</th><th>Aktion</th></tr>";

  snap.forEach(d=>{
    const h=d.data();
    html+=`<tr>
      <td>${h.timestamp}</td>
      <td>${h.user}</td>
      <td>${h.status||"-"}</td>
      <td>${h.action}</td>
    </tr>`;
  });

  html+="</table>";
  div.innerHTML=html;
}

// START
initSteps();
loadProductName();
loadProductData();

function startApp(){
  listenSteps();
}

contentDiv.style.display="none";

</script>

</body>
</html>
