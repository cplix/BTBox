<!DOCTYPE html>
<html>
<head>
  <title>Produktdaten</title>
</head>
<body>

<h1>Produktdaten</h1>
<div id="content"></div>

<script>
async function loadData() {
  const id = window.location.pathname.split("/").pop();

  const response = await fetch(`data/${id}.json`);
  const data = await response.json();

  document.getElementById("content").innerHTML = `
    <p><b>ID:</b> ${data.product_id}</p>
    <p><b>Version:</b> ${data.version}</p>
    <p><b>3D-Druck:</b> ${data.manufacturing["3d_print"].material}, ${data.manufacturing["3d_print"].layer_height}</p>
    <p><b>CNC:</b> ${data.manufacturing.cnc.material}</p>
    <p><b>Qualität:</b> ${data.quality.status}</p>
  `;
}

loadData();
</script>

</body>
</html>
